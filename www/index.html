<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bibibibi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f0f2f5;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .header h1 {
      font-size: 24px;
      color: #1890ff;
    }
    .note-card {
      background: #fff;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .note-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .note-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #1890ff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
    }
    .note-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }
    .note-author {
      font-weight: 500;
    }
    .note-time {
      font-size: 12px;
      color: #999;
      margin-left: 8px;
    }
    .note-content {
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note-footer {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
      font-size: 14px;
      color: #666;
    }
    .note-footer span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .error {
      text-align: center;
      padding: 40px;
      color: #ff4d4f;
    }
    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 1em 0 0.5em; font-weight: 600; }
    .markdown-body p { margin: 0.5em 0; }
    .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin: 0.5em 0; }
    .markdown-body code { background: #f5f5f5; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
    .markdown-body pre { background: #f5f5f5; padding: 1em; border-radius: 6px; overflow-x: auto; }
    .markdown-body pre code { background: none; padding: 0; }
    .markdown-body blockquote { border-left: 4px solid #d9d9d9; padding-left: 1em; color: #666; margin-left: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>bibibibi</h1>
    </div>
    <div id="notes"></div>
  </div>

  <script>
    const API_BASE = 'http://192.168.100.10:3030/api/v1';

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getInitial(name) {
      return name ? name.charAt(0).toUpperCase() : 'U';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function parseMarkdown(text) {
      let html = escapeHtml(text);
      
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      html = html.replace(/`(.+?)`/g, '<code>$1</code>');
      
      html = html.replace(/\n/g, '<br>');
      
      return html;
    }

    async function fetchNotes() {
      const notesContainer = document.getElementById('notes');
      notesContainer.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const response = await fetch(`${API_BASE}/bibis`);
        if (!response.ok) throw new Error('获取笔记失败');
        
        const data = await response.json();
        const bibis = data.bibis || [];

        if (bibis.length === 0) {
          notesContainer.innerHTML = '<div class="empty">暂无笔记</div>';
          return;
        }

        notesContainer.innerHTML = bibis.map(bibi => `
          <div class="note-card">
            <div class="note-header">
              <div class="note-avatar">
                ${bibi.creator?.avatar 
                  ? `<img src="${escapeHtml(bibi.creator.avatar)}" alt="${escapeHtml(bibi.creator.nickname || bibi.creator.username)}">` 
                  : getInitial(bibi.creator?.nickname || bibi.creator?.username)}
              </div>
              <div>
                <span class="note-author">${escapeHtml(bibi.creator?.nickname || bibi.creator?.username || '匿名用户')}</span>
                <span class="note-time">${formatDate(bibi.created_at)}</span>
              </div>
            </div>
            <div class="note-content markdown-body">
              ${parseMarkdown(bibi.content)}
            </div>
            <div class="note-footer">
              <span>评论 ${bibi.comments?.length || 0}</span>
            </div>
          </div>
        `).join('');
      } catch (error) {
        console.error('Error:', error);
        notesContainer.innerHTML = `<div class="error">加载失败: ${error.message}</div>`;
      }
    }

    fetchNotes();
  </script>
</body>
</html>
